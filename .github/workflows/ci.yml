name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-project:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas duckdb pyyaml

      - name: Syntax check
        run: |
          python -m py_compile pipeline/ingest.py
          python -m py_compile pipeline/validate.py
          python -m py_compile pipeline/transform.py
          python -m py_compile pipeline/test_data.py
          python -m py_compile pipeline/orchestrate.py

      - name: Run pipeline
        run: |
          python pipeline/ingest.py
          python pipeline/validate.py
          python pipeline/transform.py
          python pipeline/test_data.py
